AWSTemplateFormatVersion: '2010-09-09'
Description: ECS stack - Fargate cluster, task definitions, ALB, auto-scaling, CloudWatch logs

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - commercial
      - govcloud
    Default: commercial
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID from network stack
  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet 1 for ALB
  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet 2 for ALB
  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet 1 for ECS tasks
  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet 2 for ECS tasks
  ALBSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for ALB from network stack
  ECSTaskSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for ECS tasks from network stack
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for TLS termination on ALB (leave empty for HTTP-only demo mode)
    Default: ''
  BackendImageUri:
    Type: String
    Description: ECR image URI for the backend container
    Default: ''
  FrontendImageUri:
    Type: String
    Description: ECR image URI for the frontend container
    Default: ''
  OpenSearchEndpoint:
    Type: String
    Description: OpenSearch Serverless collection endpoint URL
  BedrockKbId:
    Type: String
    Description: Bedrock Knowledge Base ID
  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: AWS region for Bedrock API calls

Conditions:
  IsGovCloud: !Equals [!Ref Environment, govcloud]
  HasBackendImage: !Not [!Equals [!Ref BackendImageUri, '']]
  HasFrontendImage: !Not [!Equals [!Ref FrontendImageUri, '']]
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # ---- ECR Repositories (created externally) ----
  # BackendRepository and FrontendRepository are managed outside this stack.

  # ---- ECS Cluster ----
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'nl-search-${Environment}-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: nl-search-chatbot

  # ---- CloudWatch Log Groups ----
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/nl-search-${Environment}/backend'
      RetentionInDays: 30
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: nl-search-chatbot

  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/nl-search-${Environment}/frontend'
      RetentionInDays: 30
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: nl-search-chatbot

  # ---- IAM Roles ----
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'nl-search-${Environment}-ecs-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub
          - '${ArnPrefix}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
          - ArnPrefix: !If [IsGovCloud, 'arn:aws-us-gov', 'arn:aws']
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'nl-search-${Environment}-ecs-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvokeModel
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub
                    - '${ArnPrefix}:bedrock:*::foundation-model/*'
                    - ArnPrefix: !If [IsGovCloud, 'arn:aws-us-gov', 'arn:aws']
                  - !Sub
                    - '${ArnPrefix}:bedrock:*:${AWS::AccountId}:inference-profile/*'
                    - ArnPrefix: !If [IsGovCloud, 'arn:aws-us-gov', 'arn:aws']
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                Resource:
                  - !Sub
                    - '${ArnPrefix}:bedrock:${BedrockRegion}:${AWS::AccountId}:knowledge-base/${BedrockKbId}'
                    - ArnPrefix: !If [IsGovCloud, 'arn:aws-us-gov', 'arn:aws']
        - PolicyName: OpenSearchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                Resource:
                  - !Sub
                    - '${ArnPrefix}:aoss:${AWS::Region}:${AWS::AccountId}:collection/*'
                    - ArnPrefix: !If [IsGovCloud, 'arn:aws-us-gov', 'arn:aws']
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - '${ArnPrefix}:s3:::nl-search-${Environment}-corpus-${AWS::AccountId}'
                    - ArnPrefix: !If [IsGovCloud, 'arn:aws-us-gov', 'arn:aws']
                  - !Sub
                    - '${ArnPrefix}:s3:::nl-search-${Environment}-corpus-${AWS::AccountId}/*'
                    - ArnPrefix: !If [IsGovCloud, 'arn:aws-us-gov', 'arn:aws']
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt BackendLogGroup.Arn
                  - !Sub '${BackendLogGroup.Arn}:*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: nl-search-chatbot

  # ---- Task Definitions ----
  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'nl-search-${Environment}-backend'
      Cpu: '1024'
      Memory: '2048'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: !If
            - HasBackendImage
            - !Ref BackendImageUri
            - !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/nl-search-${Environment}-backend:latest'
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: OPENSEARCH_ENDPOINT
              Value: !Ref OpenSearchEndpoint
            - Name: BEDROCK_KB_ID
              Value: !Ref BedrockKbId
            - Name: BEDROCK_REGION
              Value: !Ref BedrockRegion
            - Name: AWS_ACCOUNT_ID
              Value: !Ref AWS::AccountId
            - Name: INFERENCE_PROFILE_ARN
              Value: !Sub
                - '${ArnPrefix}:bedrock:${BedrockRegion}:${AWS::AccountId}:inference-profile/us.anthropic.claude-sonnet-4-20250514-v1:0'
                - ArnPrefix: !If [IsGovCloud, 'arn:aws-us-gov', 'arn:aws']
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend
          HealthCheck:
            Command:
              - CMD-SHELL
              - 'curl -f http://localhost:8000/health || exit 1'
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: nl-search-chatbot

  FrontendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'nl-search-${Environment}-frontend'
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: frontend
          Image: !If
            - HasFrontendImage
            - !Ref FrontendImageUri
            - !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/nl-search-${Environment}-frontend:latest'
          Essential: true
          PortMappings:
            - ContainerPort: 8501
              Protocol: tcp
          Environment:
            - Name: BACKEND_URL
              Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref FrontendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: frontend
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: nl-search-chatbot

  # ---- Application Load Balancer ----
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'nl-search-${Environment}-alb'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      SecurityGroups:
        - !Ref ALBSecurityGroupId
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: nl-search-chatbot

  # ---- Target Groups ----
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'nl-search-${Environment}-be-tg'
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'nl-search-${Environment}-fe-tg'
      Port: 8501
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ---- ALB Listeners ----
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref FrontendTargetGroup

  # ---- Listener Rules ----
  BackendHTTPSListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: HasCertificate
    Properties:
      ListenerArn: !Ref HTTPSListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - /chat*
            - /sessions*
            - /health*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  BackendHTTPListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HTTPListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - /chat*
            - /sessions*
            - /health*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ---- Fargate Services ----
  BackendService:
    Type: AWS::ECS::Service
    DependsOn:
      - BackendHTTPListenerRule
    Properties:
      ServiceName: !Sub 'nl-search-${Environment}-backend'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
          SecurityGroups:
            - !Ref ECSTaskSecurityGroupId
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 8000
          TargetGroupArn: !Ref BackendTargetGroup
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: nl-search-chatbot

  FrontendService:
    Type: AWS::ECS::Service
    DependsOn:
      - HTTPListener
    Properties:
      ServiceName: !Sub 'nl-search-${Environment}-frontend'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref FrontendTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
          SecurityGroups:
            - !Ref ECSTaskSecurityGroupId
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: 8501
          TargetGroupArn: !Ref FrontendTargetGroup
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: nl-search-chatbot

  # ---- Auto-Scaling (frontend only; backend runs single task for demo with in-memory sessions) ----
  FrontendScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 3
      MinCapacity: 1
      ResourceId: !Sub 'service/${ECSCluster}/${FrontendService.Name}'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub
        - '${ArnPrefix}:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'
        - ArnPrefix: !If [IsGovCloud, 'arn:aws-us-gov', 'arn:aws']

  FrontendScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub 'nl-search-${Environment}-frontend-cpu-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref FrontendScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  ClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${AWS::StackName}-ClusterName'

  ClusterArn:
    Description: ECS cluster ARN
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ClusterArn'

  ALBDnsName:
    Description: ALB DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALBDnsName'

  ALBArn:
    Description: ALB ARN
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub '${AWS::StackName}-ALBArn'

  BackendServiceName:
    Description: Backend ECS service name
    Value: !GetAtt BackendService.Name
    Export:
      Name: !Sub '${AWS::StackName}-BackendServiceName'

  FrontendServiceName:
    Description: Frontend ECS service name
    Value: !GetAtt FrontendService.Name
    Export:
      Name: !Sub '${AWS::StackName}-FrontendServiceName'

  ECSTaskRoleArn:
    Description: IAM task role ARN for ECS tasks
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ECSTaskRoleArn'
